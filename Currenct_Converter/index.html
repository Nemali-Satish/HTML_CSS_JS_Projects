<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter Pro</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Currency Converter</h1>
            <p>Real-time exchange rates</p>
        </header>

        <form id="converter-form">
            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" placeholder="0.00" step="any" required />
            </div>

            <div class="converter-controls">
                <div class="form-group">
                    <label for="from-currency">From</label>
                    <select id="from-currency"></select>
                </div>

                <button type="button" id="swap-btn" title="Swap Currencies">
                    <i class="fas fa-right-left"></i>
                </button>

                <div class="form-group">
                    <label for="to-currency">To</label>
                    <select id="to-currency"></select>
                </div>
            </div>

            <button type="submit" id="convert-btn">Convert Now</button>
        </form>

        <div id="result-container" class="hidden">
            <p id="exchange-rate-text"></p>
            <h2 id="result-value"></h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
